name: Lint

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  standard:
    name: Standardrb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run Standardrb with Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install reviewdog
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b ./bin
          
          # Run standardrb and pipe to reviewdog
          # We use specific formatter 'clang' which matches the 'rubocop' format in reviewdog
          # We use tee to see the output in the logs for debugging purposes
          set -o pipefail
          bundle exec standardrb --format clang --force-exclusion | tee standardrb_output.txt | ./bin/reviewdog -f=rubocop -reporter=github-pr-review -fail-level=any
